name: Daily Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    if: false
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Trigger backup via API
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$ADMIN_API_TOKEN" ] || [ -z "$SITE_URL" ]; then
            echo "Error: ADMIN_API_TOKEN or SITE_URL secret is not configured"
            echo "Please add these secrets in GitHub repo Settings > Secrets and variables > Actions"
            exit 1
          fi

          HTTP_CODE=$(curl -s -o backup.json -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer $ADMIN_API_TOKEN" \
            -H "Content-Type: application/json" \
            "${SITE_URL}/api/v1/admin/export")

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Backup failed with HTTP status $HTTP_CODE"
            echo "Response:"
            cat backup.json 2>/dev/null || echo "No response body"
            exit 1
          fi

          echo "Backup completed successfully"
          ls -la backup.json

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-backup-${{ github.run_number }}
          path: backup.json
          retention-days: 30

      - name: Commit backup to repo
        run: |
          mkdir -p backups
          DATE=$(date +%Y-%m-%d)
          cp backup.json "backups/backup-${DATE}.json"

          # Keep only last 30 daily backups in the directory
          cd backups
          ls -t backup-*.json | tail -n +31 | xargs -r rm --
          cd ..

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet || git commit -m "backup: ${DATE}"
          git push
