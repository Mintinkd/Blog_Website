name: Daily Backup

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backup via API
        run: |
          RESPONSE=$(curl -s -w "%{http_code}" \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.ADMIN_API_TOKEN }}" \
            "${{ secrets.SITE_URL }}/api/v1/admin/export" \
            -o backup.json)

          if [ "$RESPONSE" -ne 200 ]; then
            echo "Backup failed with HTTP status $RESPONSE"
            exit 1
          fi

          echo "Backup completed successfully"
          ls -la backup.json

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: blog-backup-${{ github.run_number }}
          path: backup.json
          retention-days: 30